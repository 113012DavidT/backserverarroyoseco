name: Deploy Neurona to Google Cloud

on:
  push:
    branches: [ main ]
    paths:
      - 'neurona/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.NEURONA_HOST }}
          username: ${{ secrets.NEURONA_USER }}
          key: ${{ secrets.NEURONA_SSH_KEY }}
          script: |
            cd ~/neurona-arroyoseco
            git pull origin main
            docker compose up -d --build
            docker image prune -f
