version: "3.9"

services:
  neurona:
    build: .
    container_name: neurona-arroyoseco
    restart: unless-stopped

    # ── Seguridad: sin privilegios extra, filesystem solo-lectura ────────────
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777   # Gunicorn y TensorFlow usan /tmp

    # ── Límites de recursos ──────────────────────────────────────────────────
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
        reservations:
          memory: 256M

    # ── Variables de entorno desde archivo .env (nunca hardcodeadas) ────────
    env_file:
      - .env

    # ── Red interna: el puerto NO queda expuesto en internet directamente ───
    #    El reverse-proxy (nginx / Traefik) hace el forward interno.
    #    Cambia "5000:5000" por este bloque para produccion real.
    ports:
      - "127.0.0.1:5000:5000"   # solo localhost del host, no 0.0.0.0

    # ── Healthcheck nativo de Docker ─────────────────────────────────────────
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    # ── Logs estructurados ───────────────────────────────────────────────────
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
